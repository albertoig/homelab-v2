name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - '.github/workflows/ci.yaml'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ============================================
  # DEPENDENCY REVIEW - Only runs on PRs
  # Checks if new dependencies have known CVEs
  # ============================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ============================================
  # LINT & FORMAT - Foundation of the pipeline
  # All other jobs depend on this passing
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install

      - name: Run Ruff Check
        run: poetry run ruff check src/ tests/

      - name: Run Ruff Format Check
        run: poetry run ruff format --check src/ tests/

  # ============================================
  # SECURITY SCAN - Only runs if lint passes
  # Uses bandit to find security issues
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install

      - name: Install Bandit
        run: poetry run pip install bandit

      - name: Run Bandit Security Scan
        run: poetry run bandit -r src/ -x .venv/ -f json -o bandit-report.json --severity-level high

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

  # ============================================
  # CODEQL SECURITY SCAN - Advanced security analysis
  # Runs CodeQL for deeper security scanning
  # ============================================
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ============================================
  # UNIT TEST - Only runs if lint passes
  # Runs pytest with coverage
  # ============================================
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install

      - name: Run pytest
        run: poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --junit-xml=pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-report
          path: pytest-report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          flags: unittests
          name: homelab-infra
